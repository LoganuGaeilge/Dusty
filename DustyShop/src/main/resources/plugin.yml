name: DustyShop
version: 1.0.0
main: com.dustyrpg.shop.DustyShop
api-version: 1.16
softdepend: [DustyEconomy]
commands:
  shop:
    description: Open the server shop
    aliases: [store]
    usage: /<command> [reload]
    permission: dustyshop.use
permissions:
  dustyshop.use:
    description: Allows use of the /shop command
    default: true
  dustyshop.admin:
    description: Allows reloading the shop config
    default: op
