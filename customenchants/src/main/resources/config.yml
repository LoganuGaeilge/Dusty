  # want handed out deliberately, not via random rolls.
  soulbound:
    display-name: "&8Soulbound"
    enchant-rarity: "NA"
    max-level: 1
    success-chance: 100.0
    supported-items:
      - DIAMOND_SWORD
      - NETHERITE_SWORD
