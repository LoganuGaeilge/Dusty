      - NETHERITE_PICKAXE
    gui-on: false
    actions:
      on-apply:
        - "msg: &8This item is now Soulbound to you."

# ---------------------------------------------------------
# ---------------------------------------------------------
# global-tools: (optional)
#
# Named groups of item types that run their own "actions:" on the
# configured triggers by themselves - no enchant book, no PDC data, no
# "applying" anything. This is for effects that should just always exist
# on a type of tool, e.g. "every diamond and netherite pickaxe drops one
# extra of whatever it just mined, everywhere except the mine-reset
# region" - without inventing a fake always-applied enchant to get there.
#
# Each entry supports EXACTLY the same "actions:"/"values:"/"ranges:"/
# "block-drops:" shape as an enchant above (see the "enchants:" notes
# further up for the full DSL - chance:, setvar:, randomvar:, blockdrop:,
# disabled-regions:, etc. all work identically here), plus:
#
#   materials: (required) list of bukkit Material names this set applies
#     to, checked against whatever item is in the player's main hand.
#
#   level: (optional, default 1) since there's no book/enchant level here,
#     this is a fixed number used for %level%/%level_num% placeholders and
#     any level-scaled "values:"/"ranges:" entries in this set.
#
# Runs IN ADDITION to (never instead of) any real enchants the item also
# has applied, and fires regardless of whether the item has any applied
# enchants at all - that's the whole point.
# ---------------------------------------------------------
global-tools:
  all_pickaxes:
    materials:
      - WOOD_PICKAXE
      - STONE_PICKAXE
      - IRON_PICKAXE
      - GOLDEN_PICKAXE
      - DIAMOND_PICKAXE
      - NETHERITE_PICKAXE
    # Optional per-set override for blockdrop:, on top of the plugin-wide
    # settings.block-drops section - same shape as an enchant's own
    # "block-drops:" section above.
    block-drops:
      enabled: true
      disabled-regions: []   # e.g. ["mine-reset-zone"]
    actions:
      on-break-block:
        # "disabled-regions:" works here too, gating a plain msg: line
        # rather than a blockdrop: - proving region checks aren't tied to
        # bonus drops specifically. Remove/replace freely.
        - "disabled-regions: mine_world: cmd: currencyadd orbs 1 %player%"
